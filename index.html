<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hyper-Realistic Grass Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
        }
        .instruction {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
            text-align: center;
            transition: opacity 0.5s;
        }
        #vr-button {
            pointer-events: auto;
            margin-top: 10px;
        }
        canvas {
            display: block;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="instructions" class="instruction">
            <h3>🌿 Touch Grass Simulator 🌿</h3>
            <p>Desktop: WASD to Move, Shift to Sprint, C to Crouch/Bend, Click to Lock Mouse</p>
            <p>VR: Full Hand Tracking Enabled. Bend down physically to touch.</p>
        </div>
    </div>
    <script type="module" src="./main.js"></script>

</body>
</html>
